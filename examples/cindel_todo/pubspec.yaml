name: cindel_todo
description: Example Flutter app showing Cindel CRUD, schemas, indexes, queries, watchers, and schema versions.
publish_to: 'none'
version: 0.1.9+11

environment:
  sdk: ^3.11.5

dependencies:
  cindel: ^0.1.17-dev.2
  cindel_flutter_libs: ^0.1.10-dev.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2

dev_dependencies:
  build_runner: ^2.10.4
  cindel_generator: ^0.1.10-dev.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
