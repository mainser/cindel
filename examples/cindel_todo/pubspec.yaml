name: cindel_todo
description: Example Flutter app showing Cindel CRUD, schemas, indexes, queries, watchers, and schema versions.
publish_to: 'none'
version: 0.1.2+3

environment:
  sdk: ^3.11.5

dependencies:
  cindel:
    path: ../../packages/cindel
  cindel_flutter_libs:
    path: ../../packages/cindel_flutter_libs
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2

dev_dependencies:
  build_runner: ^2.10.4
  cindel_generator:
    path: ../../packages/cindel_generator
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
