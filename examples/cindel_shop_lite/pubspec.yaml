name: cindel_shop_lite
description: Shop app example using cindel, riverpod and freezed.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  adaptive_theme: ^3.7.2
  cindel: ^0.5.13
  cindel_flutter_libs: ^0.5.13
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  hooks_riverpod: ^3.3.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2

dev_dependencies:
  build_runner: ^2.15.0
  cindel_generator: ^0.5.9
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.3
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
