name: Backend Benchmark

on:
  workflow_dispatch:
    inputs:
      documents:
        description: Number of documents per backend
        required: true
        default: "10000"
      query_repeats:
        description: Number of query repetitions per backend
        required: true
        default: "1000"

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN: 1.90.0

jobs:
  backend-benchmark:
    name: SQLite vs MDBX benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM/libclang
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: Set up Rust
        run: rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmark-mdbx
          workspaces: |
            packages/cindel/native -> target

      - name: Run backend benchmark
        run: |
          cargo +${{ env.RUST_TOOLCHAIN }} run --release --locked \
            --manifest-path packages/cindel/native/Cargo.toml \
            --features benchmarks \
            --bin cindel_bench \
            -- \
            --backend all \
            --documents "${{ inputs.documents }}" \
            --query-repeats "${{ inputs.query_repeats }}" \
            > backend-benchmark.csv

      - name: Upload benchmark CSV
        uses: actions/upload-artifact@v4
        with:
          name: backend-benchmark
          path: backend-benchmark.csv
