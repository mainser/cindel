name: Integration Test

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

concurrency:
  group: integration-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: 3.41.9
  RUNNER_DIR: packages/cindel_realworld_runner

jobs:
  web:
    name: Web real-world runner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-realworld-${{ hashFiles('packages/cindel_realworld_runner/pubspec.lock', 'packages/cindel_realworld_runner/pubspec.yaml', 'packages/**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-realworld-
            ${{ runner.os }}-pub-

      - name: Install runner dependencies
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter pub get

      - name: Run Web integration scenario
        working-directory: ${{ env.RUNNER_DIR }}
        run: |
          chromedriver --port=4444 &
          sleep 2
          flutter drive --driver=test_driver/integration_test.dart --target=integration_test/realworld_runner_test.dart -d chrome

  android:
    name: Android real-world runner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-realworld-${{ hashFiles('packages/cindel_realworld_runner/pubspec.lock', 'packages/cindel_realworld_runner/pubspec.yaml', 'packages/**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-realworld-
            ${{ runner.os }}-pub-

      - name: Install runner dependencies
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter pub get

      - name: Run Android integration scenario
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: ${{ env.RUNNER_DIR }}
          script: flutter test integration_test/realworld_runner_test.dart -d emulator-5554

  linux:
    name: Linux real-world runner
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-realworld-${{ hashFiles('packages/cindel_realworld_runner/pubspec.lock', 'packages/cindel_realworld_runner/pubspec.yaml', 'packages/**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-realworld-
            ${{ runner.os }}-pub-

      - name: Install Linux desktop dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake libgtk-3-dev ninja-build pkg-config

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install runner dependencies
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter pub get

      - name: Run Linux integration scenario
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter test integration_test/realworld_runner_test.dart -d linux

  windows:
    name: Windows real-world runner
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-realworld-${{ hashFiles('packages/cindel_realworld_runner/pubspec.lock', 'packages/cindel_realworld_runner/pubspec.yaml', 'packages/**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-realworld-
            ${{ runner.os }}-pub-

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install runner dependencies
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter pub get

      - name: Run Windows integration scenario
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter test integration_test/realworld_runner_test.dart -d windows

  macos:
    name: macOS real-world runner
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-realworld-${{ hashFiles('packages/cindel_realworld_runner/pubspec.lock', 'packages/cindel_realworld_runner/pubspec.yaml', 'packages/**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-realworld-
            ${{ runner.os }}-pub-

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install runner dependencies
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter pub get

      - name: Run macOS integration scenario
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter test integration_test/realworld_runner_test.dart -d macos

  ios:
    name: iOS real-world runner
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-realworld-${{ hashFiles('packages/cindel_realworld_runner/pubspec.lock', 'packages/cindel_realworld_runner/pubspec.yaml', 'packages/**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-realworld-
            ${{ runner.os }}-pub-

      - name: Install runner dependencies
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter pub get

      - name: Boot first available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          if [ -z "${device_id}" ]; then
            echo "::error::No available iPhone simulator found."
            exit 1
          fi
          xcrun simctl boot "${device_id}" || true
          echo "device_id=${device_id}" >> "${GITHUB_OUTPUT}"

      - name: Run iOS integration scenario
        working-directory: ${{ env.RUNNER_DIR }}
        run: flutter test integration_test/realworld_runner_test.dart -d "${{ steps.simulator.outputs.device_id }}"
