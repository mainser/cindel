name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: 3.41.9
  RUST_TOOLCHAIN: 1.90.0

jobs:
  dart-static:
    name: Dart format and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock', 'examples/**/pubspec.lock', '**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Flutter workspace dependencies
        run: flutter pub get

      - name: Install example dependencies
        shell: bash
        run: |
          mapfile -t example_dirs < <(find examples -mindepth 1 -maxdepth 1 -type d | sort)
          for example_dir in "${example_dirs[@]}"; do
            if [ -f "${example_dir}/pubspec.yaml" ]; then
              echo "::group::${example_dir}"
              (cd "${example_dir}" && flutter pub get)
              echo "::endgroup::"
            fi
          done

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze publishable packages
        run: flutter analyze packages/cindel packages/cindel_annotations packages/cindel_generator packages/cindel_flutter_libs

  dart-package-tests:
    name: Dart package tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock', 'examples/**/pubspec.lock', '**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Flutter workspace dependencies
        run: flutter pub get

      - name: Run backend-neutral package tests and collect coverage
        shell: bash
        run: |
          rm -rf coverage/dart-packages
          mkdir -p coverage/dart-packages/raw

          dart test packages/cindel/test/core_dart_test.dart \
            -r expanded \
            --coverage=coverage/dart-packages/raw/packages_cindel_core

          mapfile -t test_dirs < <(find packages -path '*/test' -type d -not -path '*/.dart_tool/*' -not -path 'packages/cindel/test' | sort)
          if [ "${#test_dirs[@]}" -eq 0 ]; then
            echo "::error::No backend-neutral package test directories found."
            exit 1
          fi

          for test_dir in "${test_dirs[@]}"; do
            package_dir="${test_dir%/test}"
            coverage_dir="coverage/dart-packages/raw/${package_dir//\//_}"
            echo "::group::${test_dir}"
            if grep -q 'sdk: flutter' "${package_dir}/pubspec.yaml"; then
              flutter test "${test_dir}"
            else
              mkdir -p "${coverage_dir}"
              dart test "${test_dir}" -r expanded --coverage="${coverage_dir}"
            fi
            echo "::endgroup::"
          done

          if find coverage/dart-packages/raw -name '*.json' -print -quit | grep -q .; then
            dart run coverage:format_coverage \
              --lcov \
              --in=coverage/dart-packages/raw \
              --out=coverage/dart-packages/lcov.info \
              --package=. \
              --base-directory=. \
              --report-on=packages/cindel/lib \
              --report-on=packages/cindel_annotations/lib \
              --report-on=packages/cindel_generator/lib
          fi

      - name: Upload Dart package coverage to Codecov
        if: ${{ hashFiles('coverage/dart-packages/lcov.info') != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/dart-packages/lcov.info
          flags: dart-packages
          name: dart-packages
          fail_ci_if_error: true

  sqlite-backend:
    name: SQLite backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CINDEL_NATIVE_LIBRARY: ${{ github.workspace }}/packages/cindel/native/target/debug/libcindel_native.so

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock', 'examples/**/pubspec.lock', '**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Set up Rust
        run: rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-sqlite-only
          workspaces: |
            packages/cindel/native -> target

      - name: Install Flutter workspace dependencies
        run: flutter pub get

      - name: Check Rust formatting
        run: cargo +${{ env.RUST_TOOLCHAIN }} fmt --manifest-path packages/cindel/native/Cargo.toml --check

      - name: Build Rust native core without MDBX
        run: cargo +${{ env.RUST_TOOLCHAIN }} build --locked --no-default-features --manifest-path packages/cindel/native/Cargo.toml

      - name: Run Rust tests without MDBX
        run: cargo +${{ env.RUST_TOOLCHAIN }} test --locked --no-default-features --manifest-path packages/cindel/native/Cargo.toml

      - name: Run Cindel package tests with SQLite and collect coverage
        shell: bash
        run: |
          rm -rf coverage/sqlite
          mkdir -p coverage/sqlite/raw

          dart test packages/cindel/test/sqlite_backend_test.dart \
            -r expanded \
            --coverage=coverage/sqlite/raw

          dart run coverage:format_coverage \
            --lcov \
            --in=coverage/sqlite/raw \
            --out=coverage/sqlite/lcov.info \
            --package=. \
            --base-directory=. \
            --report-on=packages/cindel/lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/sqlite/lcov.info
          flags: dart-sqlite
          name: dart-sqlite
          fail_ci_if_error: true

  mdbx-backend:
    name: MDBX backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CINDEL_NATIVE_LIBRARY: ${{ github.workspace }}/packages/cindel/native/target/debug/libcindel_native.so

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock', 'examples/**/pubspec.lock', '**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install LLVM/libclang
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: Set up Rust
        run: rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-mdbx
          workspaces: |
            packages/cindel/native -> target

      - name: Install Flutter workspace dependencies
        run: flutter pub get

      - name: Build Rust native core with MDBX
        run: cargo +${{ env.RUST_TOOLCHAIN }} build --locked --manifest-path packages/cindel/native/Cargo.toml

      - name: Run Rust tests with MDBX
        run: cargo +${{ env.RUST_TOOLCHAIN }} test --locked --manifest-path packages/cindel/native/Cargo.toml

      - name: Run Cindel package tests with MDBX and collect coverage
        shell: bash
        run: |
          rm -rf coverage/mdbx
          mkdir -p coverage/mdbx/raw

          dart test packages/cindel/test/mdbx_backend_test.dart \
            -r expanded \
            --coverage=coverage/mdbx/raw

          dart run coverage:format_coverage \
            --lcov \
            --in=coverage/mdbx/raw \
            --out=coverage/mdbx/lcov.info \
            --package=. \
            --base-directory=. \
            --report-on=packages/cindel/lib

      - name: Upload MDBX coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/mdbx/lcov.info
          flags: dart-mdbx
          name: dart-mdbx
          fail_ci_if_error: true
