  build: ^4.0.6
  source_gen: ^4.2.3
  cindel_annotations: ^0.5.4

dev_dependencies:
  build_runner: ^2.15.0
  build_test: ^3.5.15
  lints: ^6.1.0
  test: ^1.31.1
