name: cindel_realworld_runner
description: Headless real-world Cindel integration runner for GitHub Actions.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  cindel:
    path: ../cindel
  cindel_flutter_libs:
    path: ../cindel_flutter_libs
  flutter:
    sdk: flutter
  path_provider: ^2.1.5

dev_dependencies:
  build_runner: ^2.15.0
  cindel_generator:
    path: ../cindel_generator
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: false
