[package]
name = "cindel_native"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[features]
default = ["mdbx"]
mdbx = ["dep:libmdbx"]
web = ["dep:sqlite-wasm-vfs"]

[dependencies]
libmdbx = { version = "0.6.6", optional = true, default-features = false }
rusqlite = { version = "0.39.0", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }

[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
sqlite-wasm-vfs = { version = "0.2", optional = true }

[patch.crates-io]
mdbx-sys = { path = "vendor/mdbx-sys" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
