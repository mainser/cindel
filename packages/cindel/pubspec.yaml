name: cindel
description: Flutter-first local database API with a native Rust core and Dart FFI bridge.
version: 0.1.1
publish_to: none

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  ffi: ^2.2.0
  native_toolchain_rust: ^1.0.4
  cindel_annotations:
    path: ../cindel_annotations

dev_dependencies:
  build_runner: ^2.15.0
  cindel_generator:
    path: ../cindel_generator
  lints: ^6.1.0
  test: ^1.31.1
