name: cindel
description: Generated typed local database for Flutter and Dart apps with MDBX, SQLite, and SQLite Web/OPFS backends.
version: 0.6.5
homepage: https://github.com/mainser/cindel
repository: https://github.com/mainser/cindel
issue_tracker: https://github.com/mainser/cindel/issues
documentation: https://github.com/mainser/cindel/blob/main/docs/api_docs.md
topics:
  - database
  - nosql
  - storage
  - cindel
  - flutter

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  ffi: ^2.2.0
  hooks: ^2.0.2
  native_toolchain_rust: ^1.0.4
  web: ^1.1.1
  cindel_annotations: ^0.6.4

dev_dependencies:
  build_runner: ^2.15.0
  cindel_generator: ^0.6.4
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  lints: ^6.1.0
  test: ^1.31.1
