name: cindel
description: Ultra-fast, lightweight NoSQL local database for Flutter and Dart apps, powered by a compact Rust native core.
version: 0.1.16
publish_to: none
homepage: https://github.com/mainser/Cindel
repository: https://github.com/mainser/Cindel
issue_tracker: https://github.com/mainser/Cindel/issues
documentation: https://github.com/mainser/Cindel/tree/dev/packages/cindel#readme
topics:
  - database
  - nosql
  - flutter
  - ffi
  - local-storage

platforms:
  android:
  ios:
  windows:

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  ffi: ^2.2.0
  native_toolchain_rust: ^1.0.4
  cindel_annotations:
    path: ../cindel_annotations

dev_dependencies:
  build_runner: ^2.15.0
  cindel_generator:
    path: ../cindel_generator
  lints: ^6.1.0
  test: ^1.31.1
