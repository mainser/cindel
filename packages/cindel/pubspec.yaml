name: cindel
description: Ultra-fast, lightweight NoSQL local database for Flutter and Dart apps, powered by a compact Rust native core.
version: 0.6.2
homepage: https://github.com/mainser/cindel
repository: https://github.com/mainser/cindel
issue_tracker: https://github.com/mainser/cindel/issues
documentation: https://github.com/mainser/cindel/tree/main/packages/cindel#readme
topics:
  - database
  - nosql
  - storage
  - cindel
  - encryption

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  ffi: ^2.2.0
  hooks: ^1.0.3
  native_toolchain_rust: ^1.0.4
  cindel_annotations: ^0.5.4

dev_dependencies:
  build_runner: ^2.15.0
  cindel_generator: ^0.6.1
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  lints: ^6.1.0
  test: ^1.31.1
